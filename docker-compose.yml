services:

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_RETENTION_HOURS: 12
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_SEGMENT_BYTES: 10485760       # 10MB
      KAFKA_LOG_RETENTION_BYTES: 52428800     # 토픽당 50MB
      KAFKA_NUM_IO_THREADS: 2                 # 기본 8 → 2
      KAFKA_NUM_NETWORK_THREADS: 2            # 기본 3 → 2
      KAFKA_BACKGROUND_THREADS: 2             # 기본 10 → 2
      KAFKA_HEAP_OPTS: "-Xmx96m -Xms96m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 1
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5

  # ── 배치: 공시 인덱싱 (완료 후 종료 → 메모리 반환) ──
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      JAVA_OPTS: "-Xmx128m -Xms64m -XX:MaxMetaspaceSize=64m"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── 수집기: DART 공시 + 뉴스 RSS → Kafka raw.news ──
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DART_API_KEY: ${DART_API_KEY:-}
      DART_ENABLED: ${DART_ENABLED:-true}
      RSS_ENABLED: ${RSS_ENABLED:-true}
      RSS_FEED_1: ${RSS_FEED_1:-}
      JAVA_OPTS: "-Xmx128m -Xms64m"
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ── Flink: 스트리밍 전처리 (NER, 중복제거, 스코어링) ──
  flink-jobmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    command: standalone-job --job-classname com.finstream.flink.NewsEnrichmentJob
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 512m
        jobmanager.memory.jvm-overhead.max: 64m
        parallelism.default: 1
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 640M
    restart: unless-stopped

  flink-taskmanager:
    image: flink:1.18-java17
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 512m
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
    depends_on:
      - flink-jobmanager
    deploy:
      resources:
        limits:
          memory: 640M
    restart: unless-stopped

  # ── LLM 파이프라인: LangGraph + RAG 분석 ──
  llm-pipeline:
    build:
      context: ./llm-pipeline
      dockerfile: Dockerfile
    depends_on:
      qdrant:
        condition: service_healthy
      kafka:
        condition: service_healthy
      indexer:
        condition: service_completed_successfully
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GEMINI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      KAFKA_BOOTSTRAP: kafka:9092
      MODE: ${LLM_MODE:-stream}
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

volumes:
  kafka_data:
  qdrant_data:

# ============================================================
#  메모리 예산 — t4g.medium (2 vCPU, 4GB RAM, ~$24/월)
#
#  서비스              제한     실행 시점
#  ──────────────────────────────────────────
#  Kafka (KRaft)       192MB   상시
#  Qdrant              128MB   상시
#  Collector           256MB   상시 (10분 주기)
#  Flink JobManager    640MB   상시
#  Flink TaskManager   640MB   상시
#  LLM Pipeline        256MB   상시 (stream 모드)
#  Indexer             256MB   배치 후 종료 → 반환
#  ──────────────────────────────────────────
#  상시 합계          ~2.4GB
#  피크 (+ Indexer)   ~2.6GB
#  OS                 ~500MB
#  ──────────────────────────────────────────
#  피크 총합          ~3.1GB / 4GB  (여유 ~900MB)
# ============================================================
