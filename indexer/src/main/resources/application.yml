spring:
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  datasource:
    url: jdbc:h2:mem:batchdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

# OpenAI Embedding
openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  embedding:
    model: text-embedding-3-small
    batch-size: 20

# Qdrant
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  api-key: ${QDRANT_API_KEY:}
  use-tls: ${QDRANT_USE_TLS:false}
  collection-name: disclosures

# Indexer
indexer:
  chunk-size: 500
  chunk-overlap: 50
  schedule:
    cron: ${INDEXER_SCHEDULE_CRON:0 0 2 1 * *}
    zone: ${INDEXER_SCHEDULE_ZONE:UTC}

logging:
  level:
    com.finstream: DEBUG
    org.springframework.batch: debug
